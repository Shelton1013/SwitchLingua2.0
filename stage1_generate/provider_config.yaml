# ============================================================
# SwitchLingua 2.0 — Topic Information Provider 配置
#
# 设计理念：
#   给对话 agent 注入真实的、具体的话题信息，让对话有"谈资"。
#   不同话题调用不同的 API，确保信息的领域相关性。
#
# 使用方式：
#   - Tier 1 (无需 API key): HackerNews, arXiv, Wikipedia — 开箱即用
#   - Tier 2 (需免费 API key): NewsAPI, Semantic Scholar, TMDB
#   - 填入 API key 后自动启用对应 provider
# ============================================================


# --- API Keys（填入后启用对应 provider）---
api_keys:
  newsapi: ""              # https://newsapi.org/ 免费 100次/天
  serpapi: ""              # https://serpapi.com/ 免费 100次/月
  tmdb: ""                 # https://www.themoviedb.org/settings/api 免费

# --- 全局配置 ---
global:
  max_snippets_per_topic: 3       # 每次对话注入几条信息
  snippet_max_length: 300         # 每条信息摘要最大字符数
  cache_ttl_hours: 24             # 缓存有效期（小时）
  cache_dir: "cache/topic_info"   # 缓存目录
  request_timeout: 15             # API 请求超时（秒）
  language: "en"                  # 信息获取语言 (en/zh)

# --- 话题 → Provider 映射 ---
# 每个话题可配置多个 provider，按顺序尝试，第一个成功的返回结果
topic_providers:
  technology:
    - provider: hackernews
      params: {category: "top", limit: 10}
    - provider: web_search
      params: {query_template: "latest {topic} news technology"}

  academic:
    - provider: arxiv
      params: {categories: ["cs.CL", "cs.AI"], max_results: 10}
    - provider: semantic_scholar
      params: {fields_of_study: ["Computer Science", "Linguistics"]}

  work:
    - provider: newsapi
      params: {category: "business"}
    - provider: web_search
      params: {query_template: "workplace trends {topic} 2025"}

  daily_life:
    - provider: wikipedia
      params: {search_topics: ["daily life", "lifestyle", "urban living"]}
    - provider: web_search
      params: {query_template: "{topic} daily life tips"}

  food:
    - provider: wikipedia
      params: {search_topics: ["cuisine", "food culture", "restaurant"]}
    - provider: web_search
      params: {query_template: "best {topic} food restaurant review"}

  entertainment:
    - provider: tmdb
      params: {category: "trending"}
    - provider: web_search
      params: {query_template: "trending movies music {topic} 2025"}

  travel:
    - provider: wikipedia
      params: {search_topics: ["travel", "tourism", "destination"]}
    - provider: web_search
      params: {query_template: "{topic} travel guide tips"}

  emotion:
    - provider: web_search
      params: {query_template: "emotional wellbeing mental health {topic}"}

  finance:
    - provider: newsapi
      params: {category: "business", query: "finance stock market"}
    - provider: web_search
      params: {query_template: "financial news market {topic} 2025"}


# --- Provider 特定配置 ---
providers:
  hackernews:
    base_url: "https://hacker-news.firebaseio.com/v0"
    # 无需 API key

  arxiv:
    base_url: "https://export.arxiv.org/api"
    # 无需 API key

  wikipedia:
    base_url: "https://en.wikipedia.org/api/rest_v1"
    # 无需 API key

  semantic_scholar:
    base_url: "https://api.semanticscholar.org/graph/v1"
    # 无需 API key，但有速率限制 (100 req/5min)

  newsapi:
    base_url: "https://newsapi.org/v2"
    # 需要 API key

  tmdb:
    base_url: "https://api.themoviedb.org/3"
    # 需要 API key

  web_search:
    # 使用 DuckDuckGo HTML 搜索（无需 API key）
    base_url: "https://html.duckduckgo.com/html"
