# ------------------------------------------------------------
# Topic Domain Words (es-en)
# ------------------------------------------------------------
topic_domain_words:

  technology:
    general: ["app", "update", "bug", "server", "code", "data", "software", "system"]
    tech_profession: ["debug", "deploy", "API", "frontend", "backend", "code review", "sprint", "pull request"]

  academic:
    general: ["paper", "research", "project", "presentation", "exam", "professor"]
    academia_profession: ["methodology", "hypothesis", "peer review", "dataset", "literature review", "citation"]

  work:
    general: ["meeting", "deadline", "email", "schedule", "report", "team", "project"]
    business_profession: ["portfolio", "revenue", "ROI", "equity", "compliance", "quarter"]
    media_profession: ["campaign", "branding", "content", "pitch", "client", "brief"]
    marketing_profession: ["strategy", "target audience", "engagement", "analytics", "brand awareness"]

  daily_life:
    general: ["weekend", "shopping", "plan", "holiday", "birthday"]

  food:
    general: ["restaurant", "menu", "brunch", "buffet", "dessert", "recipe"]

  emotion:
    general: ["stress", "mood", "relax", "relationship"]

  entertainment:
    general: ["movie", "music", "game", "Netflix", "YouTube", "concert", "streaming"]

  travel:
    general: ["hotel", "airport", "flight", "booking", "check-in", "itinerary"]

  sports:
    general: ["gym", "workout", "fitness", "match", "training"]

  shopping:
    general: ["sale", "discount", "online", "brand", "promotion", "size"]


# ------------------------------------------------------------
# Situation Pools
# Topics, formality, dialogue types, relationships
# Constrained by persona template during sampling
# ------------------------------------------------------------
situation_pools:

  topics:
    - id: "technology"
      label: "Tecnología / Programación"
      L2_affinity: "high"
      weight: 0.12
    - id: "academic"
      label: "Académico / Investigación"
      L2_affinity: "high"
      weight: 0.10
    - id: "work"
      label: "Trabajo / Profesional"
      L2_affinity: "medium-high"
      weight: 0.15
    - id: "daily_life"
      label: "Vida cotidiana"
      L2_affinity: "medium"
      weight: 0.18
    - id: "food"
      label: "Comida / Restaurantes"
      L2_affinity: "low"
      weight: 0.10
    - id: "emotion"
      label: "Emociones / Relaciones"
      L2_affinity: "low"
      weight: 0.08
    - id: "entertainment"
      label: "Entretenimiento / Series / Juegos"
      L2_affinity: "medium-high"
      weight: 0.10
    - id: "travel"
      label: "Viajes"
      L2_affinity: "medium"
      weight: 0.07
    - id: "sports"
      label: "Deportes / Fitness"
      L2_affinity: "medium"
      weight: 0.05
    - id: "shopping"
      label: "Compras / Consumo"
      L2_affinity: "medium"
      weight: 0.05

  formality_levels:
    - id: "casual"
      label: "Informal / Relajado"
      cs_modifier: 0.05
    - id: "semi_formal"
      label: "Semi-formal"
      cs_modifier: 0.0
    - id: "formal"
      label: "Formal"
      cs_modifier: -0.10

  dialogue_types:
    - id: "monologue"
      label: "Monólogo / Narración"
      weight: 0.30
    - id: "dyadic"
      label: "Diálogo entre dos personas"
      weight: 0.45
    - id: "group"
      label: "Conversación grupal"
      weight: 0.25

  interlocutor_relationships:
    - id: "close_friends"
      label: "Amigos cercanos"
      default_formality: "casual"
    - id: "colleagues"
      label: "Compañeros de trabajo"
      default_formality: "semi_formal"
    - id: "classmates"
      label: "Compañeros de clase"
      default_formality: "casual"
    - id: "teacher_student"
      label: "Maestro-alumno"
      default_formality: "semi_formal"
    - id: "strangers"
      label: "Desconocidos"
      default_formality: "semi_formal"
    - id: "family"
      label: "Familia"
      default_formality: "casual"
