filler_words: ["lah", "kan", "eh", "macam", "apa", "tu", "ni", "je", "kot", "tau", "meh", "lor", "weh", "like", "you know", "well", "I mean"]
interjections: ["eh", "weh", "alamak", "aduh", "aiyo", "haih", "aiyah", "cis", "ish"]

l2_span_expectations:
  ARC_01: { typical_max: 3, desc: "Biasanya 1-3 perkataan" }
  ARC_02: { typical_min: 4, desc: "Biasanya ayat penuh/klausa penuh" }
  ARC_03: { typical_max: 5, desc: "1-5 perkataan, kerap" }

switch_type_expectations:
  ARC_01: { intra_min: 0.70, desc: "Insertional: sepatutnya terutamanya sisipan dalam ayat" }
  ARC_02: { inter_min: 0.60, desc: "Alternational: sepatutnya terutamanya pertukaran antara ayat" }
  ARC_03: { intra_min: 0.50, min_switch_density: 0.15, desc: "Dense: pertukaran dalam ayat berfrekuensi tinggi" }
  ARC_04: { desc: "Pragmatic: fleksibel, tiada kekangan tetap" }
  ARC_05: { max_cmi: 0.15, desc: "Reluctant: CMI sepatutnya sangat rendah" }
  ARC_06: { desc: "Accommodation: adaptif, tiada kekangan tetap" }

discourse_particles:
  _description: "Partikel wacana Melayu yang kerap digunakan dalam Manglish"
  particles:
    - {form: "lah", function: "emphasis/assertion", frequency: "very_high"}
    - {form: "kan", function: "tag_question/seeking_agreement", frequency: "very_high"}
    - {form: "je", function: "only/just (minimizer)", frequency: "high"}
    - {form: "kot", function: "uncertainty/hedging", frequency: "high"}
    - {form: "meh", function: "doubt/disbelief", frequency: "medium"}
    - {form: "lor", function: "resignation/acceptance", frequency: "medium"}
    - {form: "tau", function: "you_know/assertive", frequency: "medium"}
    - {form: "weh", function: "attention_getter", frequency: "medium"}
    - {form: "eh", function: "surprise/attention", frequency: "high"}
