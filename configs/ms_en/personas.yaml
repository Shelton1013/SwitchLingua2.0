      L2_affinity: "high"
      weight: 0.15
    - id: "academic"
      label: "Akademik/Penyelidikan"
      L2_affinity: "high"
      weight: 0.12
    - id: "work"
      label: "Kerja/Profesional"
      L2_affinity: "medium-high"
      weight: 0.15
    - id: "daily_life"
      label: "Kehidupan harian"
      L2_affinity: "low"
      weight: 0.15
    - id: "food"
      label: "Makanan/Minuman"
      L2_affinity: "low"
      weight: 0.08
    - id: "emotion"
      label: "Emosi/Hubungan"
      L2_affinity: "low"
      weight: 0.08
    - id: "entertainment"
      label: "Hiburan/Filem/Permainan"
      L2_affinity: "medium"
      weight: 0.10
    - id: "travel"
      label: "Pelancongan/Perjalanan"
      L2_affinity: "medium"
      weight: 0.07
