# ------------------------------------------------------------
# 人物模板池 (Persona Templates)
# 每个模板是一个合理的人物组合，内部维度已预先协调
# 约束关系：
#   - 地区 × L2水平：符合该地区的典型英语环境
#   - 年龄 × 职业：符合人生阶段
#   - L2水平 × 兼容原型：语言能力支撑得起对应的CS模式
#   - 人物 × 可用关系：符合社交场景
# ------------------------------------------------------------
