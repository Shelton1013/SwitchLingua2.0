# ------------------------------------------------------------
# 话题领域词库 (Topic Domain Words)
# 从职业上解耦，按话题组织——无论你是医生还是程序员，
# 聊美食时用的英文词都跟美食相关
# ------------------------------------------------------------
topic_domain_words:

  technology:
    general: ["app", "update", "bug", "server", "code", "data", "software", "system"]
    tech_profession: ["debug", "deploy", "API", "frontend", "backend", "code review", "sprint", "pull request"]
    # 如果人物职业是 tech，用 tech_profession；否则用 general

  academic:
    general: ["paper", "research", "project", "presentation", "exam", "professor"]
    academia_profession: ["methodology", "hypothesis", "peer review", "dataset", "literature review", "citation"]

  work:
    general: ["meeting", "deadline", "email", "schedule", "report", "team", "project"]
    finance_profession: ["portfolio", "revenue", "ROI", "equity", "compliance", "quarter"]
    media_profession: ["campaign", "branding", "content", "pitch", "client", "brief"]

  daily_life:
    general: ["weekend", "shopping", "plan", "holiday", "birthday"]

  food:
    general: ["restaurant", "menu", "brunch", "buffet", "dessert", "recipe"]

  emotion:
    general: ["stress", "mood", "relax", "relationship"]

  entertainment:
    general: ["movie", "music", "game", "Netflix", "YouTube", "concert", "drama"]

  travel:
    general: ["hotel", "airport", "flight", "booking", "check-in", "itinerary"]

  sports:
    general: ["gym", "workout", "fitness", "match", "training"]

  shopping:
    general: ["sale", "discount", "online", "brand", "promotion", "size"]


# ------------------------------------------------------------
# 情境池 (Situation Pools)
# 话题、正式度、对话类型、关系 仍然在这里定义
# 但采样时会受到 persona template 的约束
# ------------------------------------------------------------
situation_pools:

  topics:
    - id: "technology"
      label: "技术/编程"
      L2_affinity: "high"
      weight: 0.15
    - id: "academic"
      label: "学术/研究"
      L2_affinity: "high"
      weight: 0.12
    - id: "work"
      label: "工作/职场"
      L2_affinity: "medium-high"
      weight: 0.15
    - id: "daily_life"
      label: "日常生活"
      L2_affinity: "low"
      weight: 0.15
    - id: "food"
      label: "美食/餐饮"
      L2_affinity: "low"
      weight: 0.08
    - id: "emotion"
      label: "情感/关系"
      L2_affinity: "low"
      weight: 0.08
    - id: "entertainment"
      label: "娱乐/影视/游戏"
      L2_affinity: "medium"
      weight: 0.10
    - id: "travel"
      label: "旅行/出行"
      L2_affinity: "medium"
      weight: 0.07
    - id: "sports"
      label: "体育/健身"
      L2_affinity: "medium"
      weight: 0.05
    - id: "shopping"
      label: "购物/消费"
      L2_affinity: "medium-low"
      weight: 0.05

  formality_levels:
    - id: "casual"
      label: "轻松随意"
      cs_modifier: 0.05
    - id: "semi_formal"
      label: "半正式"
      cs_modifier: 0.0
    - id: "formal"
      label: "正式"
      cs_modifier: -0.10

  dialogue_types:
    - id: "monologue"
      label: "独白/叙述"
      weight: 0.30
    - id: "dyadic"
      label: "双人对话"
      weight: 0.45
    - id: "group"
      label: "多人聊天"
      weight: 0.25

  interlocutor_relationships:
    - id: "close_friends"
      label: "亲密朋友"
      default_formality: "casual"
    - id: "colleagues"
      label: "同事"
      default_formality: "semi_formal"
    - id: "classmates"
      label: "同学"
      default_formality: "casual"
    - id: "teacher_student"
      label: "师生"
      default_formality: "semi_formal"
    - id: "strangers"
      label: "陌生人"
      default_formality: "semi_formal"
    - id: "family"
      label: "家人"
      default_formality: "casual"
