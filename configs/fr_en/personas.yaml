# ------------------------------------------------------------
# Topic Domain Words (fr-en)
# ------------------------------------------------------------
topic_domain_words:

  technology:
    general: ["app", "update", "bug", "server", "code", "data", "software", "cloud"]
    tech_profession: ["debug", "deploy", "API", "frontend", "backend", "code review", "sprint", "pull request", "framework"]

  academic:
    general: ["paper", "research", "project", "presentation", "deadline", "feedback"]
    academia_profession: ["methodology", "peer review", "dataset", "literature review", "citation", "abstract"]

  work:
    general: ["meeting", "deadline", "email", "schedule", "report", "team", "project", "brief"]
    finance_profession: ["portfolio", "revenue", "ROI", "equity", "compliance"]
    eu_institution_profession: ["directive", "regulation", "stakeholder", "policy", "committee"]

  daily_life:
    general: ["weekend", "shopping", "plan", "holiday", "birthday"]

  food:
    general: ["restaurant", "menu", "brunch", "dessert", "recipe", "spot"]

  emotion:
    general: ["stress", "mood", "relax", "relationship", "burnout"]

  entertainment:
    general: ["movie", "music", "game", "Netflix", "YouTube", "concert", "podcast", "streaming"]

  travel:
    general: ["hotel", "airport", "flight", "booking", "check-in", "itinerary", "Airbnb"]

  sports:
    general: ["gym", "workout", "fitness", "match", "training", "running"]

  shopping:
    general: ["sale", "discount", "online", "brand", "promotion", "outlet"]


# ------------------------------------------------------------
# Situation Pools
# ------------------------------------------------------------
situation_pools:

  topics:
    - id: "technology"
      label: "technologie / informatique"
      L2_affinity: "high"
      weight: 0.15
    - id: "academic"
      label: "académique / recherche"
      L2_affinity: "high"
      weight: 0.10
    - id: "work"
      label: "travail / vie professionnelle"
      L2_affinity: "medium-high"
      weight: 0.18
    - id: "daily_life"
      label: "vie quotidienne"
      L2_affinity: "low"
      weight: 0.15
    - id: "food"
      label: "gastronomie / restauration"
      L2_affinity: "low"
      weight: 0.08
    - id: "emotion"
      label: "émotions / relations"
      L2_affinity: "low"
      weight: 0.07
    - id: "entertainment"
      label: "divertissement / culture"
      L2_affinity: "medium"
      weight: 0.12
    - id: "travel"
      label: "voyage / déplacements"
      L2_affinity: "medium"
      weight: 0.07
    - id: "sports"
      label: "sport / fitness"
      L2_affinity: "medium"
      weight: 0.04
    - id: "shopping"
      label: "shopping / consommation"
      L2_affinity: "medium-low"
      weight: 0.04

  formality_levels:
    - id: "casual"
      label: "décontracté"
      cs_modifier: 0.05
    - id: "semi_formal"
      label: "semi-formel"
      cs_modifier: 0.0
    - id: "formal"
      label: "formel"
      cs_modifier: -0.10

  dialogue_types:
    - id: "monologue"
      label: "monologue / récit"
      weight: 0.30
    - id: "dyadic"
      label: "dialogue à deux"
      weight: 0.45
    - id: "group"
      label: "conversation de groupe"
      weight: 0.25

  interlocutor_relationships:
    - id: "close_friends"
      label: "amis proches"
      default_formality: "casual"
    - id: "colleagues"
      label: "collègues"
      default_formality: "semi_formal"
    - id: "classmates"
      label: "camarades de classe"
      default_formality: "casual"
    - id: "teacher_student"
      label: "enseignant-étudiant"
      default_formality: "semi_formal"
    - id: "strangers"
      label: "inconnus"
      default_formality: "semi_formal"
    - id: "family"
      label: "famille"
      default_formality: "casual"
