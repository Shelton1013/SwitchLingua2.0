filler_words: ["यार", "अच्छा", "बस", "हाँ", "ना", "वो", "मतलब", "अरे", "like", "you know", "well", "I mean"]
interjections: ["अरे", "ओह", "हाय", "वाह", "अच्छा", "हाँ"]

l2_span_expectations:
  ARC_01: { typical_max: 3, desc: "आमतौर पर 1-3 शब्द" }
  ARC_02: { typical_min: 4, desc: "आमतौर पर पूरा वाक्य/clause" }
  ARC_03: { typical_max: 5, desc: "1-5 शब्द, बार-बार" }

switch_type_expectations:
  ARC_01: { intra_min: 0.70, desc: "Insertional: मुख्य रूप से sentence के अंदर embedding" }
  ARC_02: { inter_min: 0.60, desc: "Alternational: मुख्य रूप से sentences के बीच switching" }
  ARC_03: { intra_min: 0.50, min_switch_density: 0.15, desc: "Dense: high-frequency intra-sentential switching" }
  ARC_04: { desc: "Pragmatic: flexible, कोई fixed constraint नहीं" }
  ARC_05: { max_cmi: 0.15, desc: "Reluctant: CMI बहुत कम होना चाहिए" }
  ARC_06: { desc: "Accommodation: adaptive, कोई fixed constraint नहीं" }

# Note: Hindi uses Devanagari full stop (।) in addition to Latin period (.)
# Both should be recognized as sentence boundaries during evaluation.
