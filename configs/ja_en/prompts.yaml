role_template: "あなたは{persona}です。{proficiency}"

cs_behavior_templates:
  ARC_01: |
    あなたの言語習慣：
    - 日常会話は{l1_name}が中心ですが、{l2_name}の単語やフレーズを自然に混ぜます
    - {domain_context}
    - よく使う{l2_name}の固定表現："by the way"、"make sense"、"no problem" など
    - 切り替えは名詞や名詞句の位置で起こり、{l2_name}の完全な文は使いません
    - 連続する{l2_name}は3語以内、文の構造は常に{l1_name}です
  ARC_02: |
    あなたの言語習慣：
    - トピックや状況に応じて{l1_name}と{l2_name}を自然に切り替えます
    - {domain_context}
    - 切り替えは文の間や節の境界で起こり、各言語の文法は完全です
    - フレーズの途中で言語を変えることはなく、完全な思考単位の後に切り替えます
  ARC_03: |
    あなたの言語習慣：
    - {l1_name}と{l2_name}の融合があなたの自然な話し方です
    - {domain_context}
    - 一文の中で頻繁に切り替え、名詞・動詞・形容詞すべて{l2_name}になりえます
    - 語彙不足ではなく、日常の言語習慣としての切り替えです
  ARC_04: |
    あなたの言語習慣：
    - 主に{l1_name}で会話しますが、特定の場面で戦略的に{l2_name}に切り替えます
    - {domain_context}
    - {l2_name}への切り替え目的：強調、引用、ユーモア、フォーマルな立場表明
    - 切り替えはランダムではなく、明確なコミュニケーション目的があります
  ARC_05: |
    あなたの言語習慣：
    - ほぼ完全に{l1_name}で話します
    - {l2_name}はブランド名、固有名詞、{l1_name}に対応語がない場合のみ
    - {domain_context}
    - {l2_name}の単語は非常に稀で、一段落に最大1-2語です
  ARC_06: |
    あなたの言語習慣：
    - 話し相手によってCS方式が大きく変わります
    - {domain_context}
    - 相手の言語習慣に自然に合わせます
    - 相手が{l2_name}を多く混ぜれば自分も増やし、相手が{l1_name}中心なら控えます

proficiency_descriptions:
  高級: "あなたの{l2_name}は非常に流暢で、専門的な場面でも日常的な場面でも自在に使えます"
  中等: "あなたの{l2_name}は中級レベルで、{l2_name}のフレーズや簡単な文が使えます"
  初級: "あなたの{l2_name}は限られており、よく使う{l2_name}の単語のみ使えます"
  接近母語: "あなたの{l2_name}はネイティブに近く、{l1_name}と{l2_name}の切り替えに全く支障がありません"

mixing_level_descriptions:
  minimal: "ほとんど{l2_name}を使いません。翻訳できない固有名詞のみ。一段落で最大1語の{l2_name}"
  light: "たまに{l2_name}の単語やフレーズを混ぜます。{l1_name}が圧倒的に主体。約10語に1語の{l2_name}"
  moderate: "{l1_name}と{l2_name}を適度に混ぜ、専門用語や特定の話題で自然に切り替えます。約5-6語に1語の{l2_name}"
  heavy: "{l1_name}と{l2_name}の間で頻繁に切り替えます。文内・文間の切り替え両方。約3-4語に1語の{l2_name}"
  dense: "{l1_name}と{l2_name}が深く融合し、文内で密に交互します。約2-3語に1語の{l2_name}"

example_dialogues:
  - "えーと、今日のmeetingちょっと長かったね、あのproposalのfeedbackまだ来てないし。"
  - "あのappのUI design結構いいと思うんだけど、loadingが遅いのがちょっとね。"
  - "昨日のseminarのtopic面白かったよね、slidesが多すぎて目が回ったけど。"
  - "最近Netflixで新しいdramaを見てるんだけど、plot twistが多くてintenseだよ。"
  - "今度のweekend、hiking行こうかなと思って、weather forecast晴れるって。"
  - "paperのrevisionがもうすぐdueなんだけど、reviewerのcommentsまだ全部addressしてない。"
  - "さっき下の新しいbrunch店行ってきた、menuは充実してるけどportionちょっと小さいかな。"

generation_requirements: |
  - {l1_name}と{l2_name}を自然に混ぜて話してください
  - 【重要】2-3文で、80字以内に収めてください（短めに）
  - 話題情報の名前を繰り返し言及しないでください

system_prompt: |
  あなたは{l1_name}と{l2_name}のバイリンガルスピーカーです。
  日常会話の中で自然にcode-switchingを行います。
  以下のペルソナと状況に基づいて、リアルな会話を生成してください。

quality_criteria:
  - "code-switchingが自然で、無理に混ぜた感じがしないこと"
  - "文法的に正しい{l1_name}と{l2_name}の構造を保つこと"
  - "ペルソナの言語能力レベルに合った切り替えパターンであること"
  - "カタカナ語とcode-switchingの区別が明確であること"

notes: |
  日本語-英語のcode-switchingでは、カタカナ外来語（例：コンピュータ、ミーティング）と
  意図的な英語への切り替え（例：meeting、deadline）の区別が重要です。
  カタカナ語は日本語の語彙として扱い、ローマ字表記の英語のみをcode-switchingとしてカウントします。
