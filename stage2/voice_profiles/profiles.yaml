# SwitchLingua 2.0 — Voice Profile Definitions
#
# Each profile maps to a reference audio clip used for CosyVoice 3
# zero-shot voice cloning. Profiles are matched to speakers based on
# gender, age, language, and accent.
#
# To add a new voice:
#   1. Place a 3-10s clean WAV clip in audio/
#   2. Add an entry below
#   3. Re-run pipeline — new voice will be available for matching

profiles:
