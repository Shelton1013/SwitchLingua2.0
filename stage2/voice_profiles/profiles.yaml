# SwitchLingua 2.0 — Voice Profile Definitions
#
# Each profile MUST have a `transcript` field — the text spoken in the
# reference audio. CosyVoice 3 requires this for accurate voice cloning.
# Format: "You are a helpful assistant.<|endofprompt|>{actual transcript}"
#
# When you replace a reference audio file, update the transcript to match!

